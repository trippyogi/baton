<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vector Mission Control</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/tokens.css">
  <link rel="stylesheet" href="/css/layout.css">
  <link rel="stylesheet" href="/css/components.css">
</head>
<body>
  <div id="app">
    <header id="topbar"></header>
    <nav id="nav"></nav>
    <main id="canvas">
      <div id="screen-overview" class="screen"></div>
      <div id="screen-tasks"    class="screen"></div>
      <div id="screen-board"    class="screen"></div>
      <div id="screen-runs"     class="screen"></div>
      <div id="screen-workshop"     class="screen"></div>
      <div id="screen-costs"        class="screen"></div>
      <div id="screen-performance"  class="screen"></div>
      <div id="screen-memory"       class="screen"></div>
      <div id="screen-team"         class="screen"></div>
      <div id="screen-queue"      class="screen"></div>
      <div id="screen-requests"   class="screen"></div>
      <div id="screen-creatives"  class="screen"></div>
    </main>
  </div>

  <script type="module" src="/js/api.js"></script>
  <script type="module" src="/js/components/nav.js"></script>
  <script type="module" src="/js/components/topbar.js"></script>
  <script type="module" src="/js/screens/overview.js"></script>
  <script type="module" src="/js/screens/tasks.js"></script>
  <script type="module" src="/js/screens/board.js"></script>
  <script type="module" src="/js/screens/runs.js"></script>
  <script type="module" src="/js/screens/workshop.js"></script>
  <script type="module" src="/js/screens/costs.js"></script>
  <script type="module" src="/js/screens/performance.js"></script>
  <script type="module" src="/js/screens/memory.js"></script>
  <script type="module" src="/js/screens/team.js"></script>
  <script type="module" src="/js/screens/queue.js"></script>
  <script type="module" src="/js/screens/requests.js"></script>
  <script type="module" src="/js/screens/creatives.js"></script>
  <script type="module" src="/js/app.js"></script>
</body>
</html>
